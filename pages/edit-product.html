<div id="modal-overlay">

    <div id="edit-product" class="modal modal--edit">

        <div id="exit-button" class="modal__header">
            <button class="modal__close" id="close-modal" type="button" aria-label="Fechar">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <h1 class="modal__title">Editar Item</h1>

        <div id="formulary" class="modal__body">

            <form action="#" class="modal__form">

                <div class="modal__field">
                    <label for="product-name">Nome do produto</label>
                    <input type="text" name="product-name" id="product-name">
                </div>

                <div class="modal__field">
                    <label for="sector">Setor</label>
                    <input type="text" name="sector" id="sector">
                </div>

                <div id="register-button" class="modal__actions">
                    <button type="submit" class="btn btn--primary">Editar</button>
                </div>

            </form>

        </div>

    </div>

</div>
