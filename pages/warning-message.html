<div id="modal-overlay">
    <div id="warning-message"
         role="dialog"
         aria-modal="true"
         aria-labelledby="warning-title"
         aria-describedby="exclusion-message">

        <div id="warning-icon">
            <span class="material-symbols-outlined">warning</span>
        </div>

        <h1 id="warning-title">ATENÇÃO!</h1>

        <p id="exclusion-message">
            Você realmente deseja excluir este item?
        </p>

        <div id="add-cancel-buttons">
            <button id="confirm-button" type="button">Confirmar</button>
            <button id="cancel-button" type="button">Cancelar</button>
        </div>

    </div>
</div>
