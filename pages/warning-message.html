<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/warning-message.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <title>Atenção</title>
</head>

<body>

    <div id="warning-message" role="dialog" aria-labelledby="warning-title">

        <div id="warning-icon">
            <span class="material-symbols-outlined">warning</span>
        </div>

        <h1 id="warning-title">ATENÇÃO!</h1>

        <p id="exclusion-message">
            Você realmente deseja excluir este item?
        </p>

        <div id="add-cancel-buttons">

            <button id="confirm-button">
                Confirmar
            </button>

            <button id="cancel-button">
                Cancelar
            </button>

        </div>

    </div>

</body>
</html>
